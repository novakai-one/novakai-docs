# electron-builder.yml — packaging config for the desktop shell.
# Validated to load (electron-builder info effective-config); a full package
# build is intentionally not part of the gates. The packaged app anchors its
# data/ and config files at userData (see DATA DIR note in electron/main.ts).
appId: com.novakai.docs
productName: Novakai Docs
directories:
  output: release
files:
  - dist-electron/**
  - dist/**
  - package.json
mac:
  category: public.app-category.productivity
  target:
    - dmg
    - zip
